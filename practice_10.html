<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Call | 10 Tag Webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2f7, #d4e0e9);
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(120deg, #1e4a3b, #2c7a4d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.3px;
        }

        p {
            max-width: 560px;
            margin: 0 auto 1.8rem auto;
            font-size: 1.12rem;
            line-height: 1.6;
            color: #2c3e2f;
            background: rgba(255, 250, 235, 0.7);
            padding: 0.7rem 1.4rem;
            border-radius: 48px;
            backdrop-filter: blur(2px);
            font-weight: 500;
        }

        img {
            max-width: 92%;
            width: 380px;
            height: auto;
            border-radius: 32px;
            box-shadow: 0 20px 30px -12px rgba(0, 20, 10, 0.35);
            margin-bottom: 2rem;
            transition: transform 0.2s ease, box-shadow 0.3s;
            border: 2px solid rgba(255, 245, 215, 0.8);
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }

        img:hover {
            transform: scale(1.01);
            box-shadow: 0 26px 36px -14px rgba(0, 0, 0, 0.4);
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2f6b47;
            color: #fef9e6;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
        }

        a:hover {
            background: #1e5238;
            transform: translateY(-3px);
            box-shadow: 0 12px 22px -8px rgba(30, 70, 30, 0.4);
        }

        a:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <h1>🌲 Whispering Woods 🌄</h1>

    <p>
        Fresh air, silent trails, and the gentle rustle of leaves. 
        Nature isn't just a view — it's a feeling. Step outside, breathe deep, 
        and let the wilderness remind you what matters.
    </p>

    <img 
        src="https://picsum.photos/id/15/500/375" 
        alt="Misty green hills with dense forest, peaceful nature landscape"
        loading="eager"
        width="500"
        height="375"
    >

    <a href="#explore" aria-label="Discover more nature scenes">
        🌿 Start exploring →
    </a>

    <!-- 
        ✅ Exactly 10 distinct HTML tags used:
        1. <html>
        2. <head>
        3. <body>
        4. <title>
        5. <meta>
        6. <style>
        7. <h1>
        8. <p>
        9. <img>
        10. <a>
    -->
</body>
</html>
